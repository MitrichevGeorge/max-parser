<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Captcha Solver</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #e2e8f0;
        overflow: hidden;
      }
      #status {
        position: fixed;
        top: 16px;
        right: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.15);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        font-size: 13px;
        z-index: 100;
        transition: opacity 0.3s;
      }
      #status.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
      }
      .indicator.spin {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(148, 163, 184, 0.2);
        border-top-color: #22c55e;
        background: transparent;
        animation: spin 0.8s linear infinite;
      }
      .indicator.error {
        background: #ef4444;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      iframe {
        width: 100vw;
        height: 100vh;
        border: 0;
        display: block;
      }
      #success,
      #blocker {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        text-align: center;
        background: inherit;
        z-index: 200;
      }
      #success.visible,
      #blocker.visible {
        display: flex;
      }
      .check {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(34, 197, 94, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(34, 197, 94, 0.3);
      }
      .check::after {
        content: '';
        width: 28px;
        height: 14px;
        border-left: 4px solid #22c55e;
        border-bottom: 4px solid #22c55e;
        transform: rotate(-45deg) translate(2px, -2px);
      }
      .success-title {
        font-size: 24px;
        font-weight: 600;
        color: #22c55e;
        margin: 0;
      }
      .success-sub {
        font-size: 14px;
        color: #94a3b8;
        margin: 0;
      }
      .cross {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(239, 68, 68, 0.3);
        position: relative;
      }
      .cross::before,
      .cross::after {
        content: '';
        position: absolute;
        width: 28px;
        height: 4px;
        background: #ef4444;
        border-radius: 2px;
      }
      .cross::before {
        transform: rotate(45deg);
      }
      .cross::after {
        transform: rotate(-45deg);
      }
      .blocker-title {
        font-size: 24px;
        font-weight: 600;
        color: #ef4444;
        margin: 0;
      }
      .blocker-sub {
        font-size: 14px;
        color: #94a3b8;
        margin: 0;
        max-width: 420px;
        line-height: 1.5;
      }
      .refresh-btn {
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid rgba(239, 68, 68, 0.5);
        background: rgba(239, 68, 68, 0.12);
        color: #ef4444;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
      }
      .refresh-btn:hover {
        background: rgba(239, 68, 68, 0.22);
      }
    </style>
  </head>
  <body>
    <div id="status">
      <div class="indicator spin" id="indicator"></div>
      <span id="status-text">Загрузка капчи...</span>
    </div>

    <iframe id="captcha-frame"></iframe>

    <div id="success">
      <div class="check"></div>
      <p class="success-title">Можно закрыть вкладку</p>
      <p class="success-sub">Капча успешно решена</p>
    </div>

    <div id="blocker">
      <div class="cross"></div>
      <p class="blocker-title">Запросы заблокированы</p>
      <p class="blocker-sub">
        Privacy Badger (или другой блокировщик) не даёт загрузить ресурсы VK.
        Для решения капчи отключите расширение для этого сайта и обновите страницу.
      </p>
      <button class="refresh-btn" onclick="location.reload()">Обновить страницу</button>
    </div>

    <script>
      const BLOCKER_CHECK_URL = 'https://static.vk.ru/not_robot_captcha.css?pb_check=' + Date.now();

      const statusEl = document.getElementById('status');
      const indicatorEl = document.getElementById('indicator');
      const statusTextEl = document.getElementById('status-text');
      const captchaFrame = document.getElementById('captcha-frame');
      const successEl = document.getElementById('success');
      const blockerEl = document.getElementById('blocker');

      let pollTimer = null;
      let blocked = false;

      function setStatus(message, indicatorClass) {
        statusTextEl.textContent = message;
        indicatorEl.className = 'indicator ' + (indicatorClass || '');
      }

      function showSuccess() {
        clearInterval(pollTimer);
        pollTimer = null;
        statusEl.classList.add('hidden');
        successEl.classList.add('visible');
      }

      function showBlocker(url) {
        if (blocked) return;
        blocked = true;

        clearInterval(pollTimer);
        pollTimer = null;

        statusEl.classList.add('hidden');
        successEl.classList.remove('visible');
        blockerEl.classList.add('visible');

        if (url) {
          console.warn('Blocked resource detected:', url);
        }
      }

      async function detectBlockedDomain() {
        if (!navigator.onLine) return false;

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 3000);

        try {
          await fetch(BLOCKER_CHECK_URL, {
            method: 'HEAD',
            mode: 'no-cors',
            cache: 'no-store',
            signal: controller.signal,
          });
          clearTimeout(timeout);
          return false;
        } catch (err) {
          clearTimeout(timeout);
          if (err && err.name === 'AbortError') return false;
          return true;
        }
      }

      window.addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        if (e.data && e.data.type === 'vk-proxy-blocked') {
          showBlocker(e.data.url);
        }
      });

      async function init() {
        try {
          const response = await fetch('/captcha-url', { cache: 'no-store' });
          if (!response.ok) throw new Error('HTTP ' + response.status);

          const data = await response.json();
          if (data.error) throw new Error(data.error);

          const isBlocked = await detectBlockedDomain();
          if (isBlocked) {
            showBlocker();
            return;
          }

          const frameUrl = new URL('/captcha-html', location.origin);
          frameUrl.searchParams.set('url', data.url);
          captchaFrame.src = frameUrl.href;

          setStatus('Решите капчу', 'spin');

          let missCount = 0;
          pollTimer = setInterval(async () => {
            try {
              await fetch('/captcha-url', { cache: 'no-store' });
              missCount = 0;
            } catch {
              if (++missCount >= 2) {
                clearInterval(pollTimer);
                pollTimer = null;
                showSuccess();
              }
            }
          }, 500);
        } catch (error) {
          setStatus('Ошибка: ' + error.message, 'error');
        }
      }

      init();
    </script>
  </body>
</html>
